spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/intensifiedmycode?useUnicode=true&characterEncoding=utf8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: admin
      database: 0
  flyway:
    # 开发环境允许 Flyway clean（清空表后重建）
    clean-disabled: false

# MyBatis SQL 日志（开发环境打印 SQL）
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example: DEBUG
    org.springframework.security: DEBUG
