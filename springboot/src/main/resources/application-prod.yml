# ==========================================================
# 生产环境配置（密码通过环境变量注入）
# ==========================================================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${PROD_DB_HOST:localhost}:${PROD_DB_PORT:3306}/${PROD_DB_NAME:intensifiedmycode}?useUnicode=true&characterEncoding=utf8&allowMultiQueries=true&useSSL=true&serverTimezone=GMT%2b8
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
  data:
    redis:
      host: ${PROD_REDIS_HOST:localhost}
      port: ${PROD_REDIS_PORT:6379}
      password: ${PROD_REDIS_PASSWORD:}
      database: 0
  flyway:
    # 生产环境禁止 clean！重要！
    clean-disabled: true

logging:
  level:
    com.example: WARN
  file:
    name: ${user.dir}/logs/app.log
