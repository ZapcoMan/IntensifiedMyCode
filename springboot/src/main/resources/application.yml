
spring:
  # 激活哪个环境，dev / test / prod
  profiles:
    active: @spring.profiles.active@
  # 文件上传临时目录
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 9991

# ==========================================================
# MyBatis 配置
# ==========================================================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# ==========================================================
# Flyway 数据库版本管理
# ==========================================================
spring.flyway:
  enabled: true
  # 修复启动慢：baseline-on-migrate 让已有数据库直接建基线，不用手动 baseline
  baseline-on-migrate: true
  # 迁移脚本位置（classpath 相对于 resources/db/migration）
  locations: classpath:db/migration
  # 编码
  encoding: UTF-8
  # 生产环境建议设为 false，禁止自动清理
  clean-disabled: true

# ==========================================================
# Actuator 监控端点
# ==========================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

# 文件上传
file:
  upload:
    base-url: http://127.0.0.1:9991
    path: ${user.dir}/files/

# JWT 配置
jwt:
  secret: ${JWT_SECRET:IntensifiedMyCode_JWT_Secret_Key_2024!@#$%^&*()}
  expiration-days: 1
